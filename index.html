<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahe & Mashkura — Our Journey 💫</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #0d0b21;
            --deep-romantic: #1a0b12; /* More romantic dark red/purple tint */
            --gold: #f6d07a;
            --rose: #ffaac5;
            --cream: #fff8f0;
            --paper: #fdf5e6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Quicksand', sans-serif; overflow-x: hidden; background: var(--sky); color: var(--cream); }

        /* --- BACKGROUNDS --- */
        #page1 { 
            display: flex; flex-direction: column; align-items: center; padding: 50px 20px;
            background: radial-gradient(circle at center, #2d0b16 0%, #0d0b21 100%); 
            min-height: 100vh;
        }

        #page2 { 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: #e8e2d6; /* Paper/Canvas color */
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            min-height: 100vh; padding: 40px 20px; position: relative; overflow: hidden;
        }

        /* --- MUSIC BOX --- */
        #ytPlayer { position: fixed; top: -100px; left: -100px; width: 1px; height: 1px; }
        .music-control {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(246, 208, 122, 0.2); border: 1px solid var(--gold);
            padding: 10px; border-radius: 50px; cursor: pointer; color: var(--gold);
            backdrop-filter: blur(5px); font-size: 12px;
        }

        /* --- PAGE 1 ENHANCEMENTS --- */
        .photo-ring {
            width: 220px; height: 220px; /* Bigger as requested */
            border-radius: 50%; padding: 5px;
            background: conic-gradient(var(--gold), var(--rose), var(--gold));
            animation: rotate 10s linear infinite;
            box-shadow: 0 0 50px rgba(255, 107, 157, 0.3);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .photo-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #222; }
        .photo-inner img { width: 100%; height: 100%; object-fit: cover; }

        .next-btn {
            margin-top: 40px; padding: 15px 40px;
            background: transparent; border: 2px solid var(--gold);
            color: var(--gold); font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 1.2rem; cursor: pointer;
            border-radius: 30px; transition: 0.3s;
        }
        .next-btn:hover { background: var(--gold); color: var(--deep-romantic); box-shadow: 0 0 20px var(--gold); }

        /* --- PAGE 2 (THE CARD TEMPLATE) --- */
        .card-container {
            position: relative; background: white; width: 100%; max-width: 500px;
            padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transform: rotate(-1deg); border: 1px solid #ddd;
        }
        .paper-clip {
            position: absolute; top: -20px; right: 50px; width: 40px; height: 80px;
            border: 3px solid #999; border-radius: 20px; z-index: 10;
        }
        .couple-main-img {
            width: 100%; border: 10px solid #fff; outline: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .date-text {
            font-family: 'Playfair Display', serif; color: #d35400;
            font-size: 1.5rem; text-align: center; margin: 20px 0; font-weight: 900;
        }
        .message-text {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            color: #555; text-align: center; font-size: 1.2rem; line-height: 1.6;
        }
        .floral-corner {
            position: absolute; width: 200px; pointer-events: none; opacity: 0.8;
            animation: flowerFade 3s ease-in-out infinite alternate;
        }
        .top-left { top: -20px; left: -20px; transform: rotate(-15deg); }
        .bottom-right { bottom: -20px; right: -20px; transform: rotate(165deg); }

        @keyframes flowerFade { from { transform: scale(1) rotate(-15deg); } to { transform: scale(1.05) rotate(-10deg); } }

        /* --- TRANSITIONS --- */
        .fade-in { animation: fadeIn 1.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <button class="music-control" onclick="toggleMusic()">🎵 Play/Pause Music</button>

    <div id="player-container">
        <iframe id="ytPlayer" 
            src="https://www.youtube.com/embed/8PTOkwze0Vw?enablejsapi=1&autoplay=1&loop=1&playlist=8PTOkwze0Vw" 
            allow="autoplay">
        </iframe>
    </div>

    <section id="page1">
        <div style="font-size: 3rem; margin-bottom: 20px;">🌙</div>
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 40px;">
            <div class="photo-wrap">
                <div class="photo-ring">
                    <div class="photo-inner"><img src="mahe.jpg" alt="Mahe"></div>
                </div>
                <h2 style="text-align:center; font-family:'Great Vibes'; font-size: 2.5rem; color: var(--gold); margin-top:15px;">Mahe</h2>
            </div>

            <div style="font-size: 3rem; color: var(--rose); animation: pulse 1.5s infinite;">❤️</div>

            <div class="photo-wrap">
                <div class="photo-ring">
                    <div class="photo-inner"><img src="mashkura.jpg" alt="Mashkura"></div>
                </div>
                <h2 style="text-align:center; font-family:'Great Vibes'; font-size: 2.5rem; color: var(--rose); margin-top:15px;">Mashkura</h2>
            </div>
        </div>

        <h1 style="font-family:'Playfair Display'; font-size: 4rem; text-align: center;">1 Year of Love</h1>
        <p style="font-family:'Cormorant Garamond'; font-size: 1.5rem; opacity: 0.8;">365 Days. Infinite Memories.</p>

        <button class="next-btn" onclick="goToPage2()">Next Chapter →</button>
    </section>

    <section id="page2">
        <img src="https://i.ibb.co/vB8X0XW/flowers-top.png" class="floral-corner top-left" alt="flowers">
        <img src="https://i.ibb.co/vB8X0XW/flowers-top.png" class="floral-corner bottom-right" alt="flowers">

        <div class="card-container fade-in">
            <div class="paper-clip"></div>
            
            <h2 style="font-family:'Great Vibes'; color: #d35400; font-size: 3rem; text-align: center; margin-bottom: 10px;">Happy Anniversary</h2>
            
            <img src="couple.jpg" class="couple-main-img" alt="Mahe and Mashkura">
            
            <div class="date-text">29 MARCH 2025</div>
            
            <div class="message-text">
                "Wishing you the happiest of days, <br>
                filled with love, laughter, and all your <br>
                favorite things. To many more years of us."
            </div>

            <div style="margin-top: 20px; text-align: center; font-family: 'Great Vibes'; font-size: 2rem; color: #d35400;">
                Mahe & Mashkura
            </div>
        </div>

        <button class="next-btn" style="border-color: #d35400; color: #d35400;" onclick="goToPage1()">← Back</button>
    </section>

    <script>
        function goToPage2() {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function goToPage1() {
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page1').style.display = 'flex';
            window.scrollTo(0,0);
        }

        // Music Logic
        var playing = true;
        function toggleMusic() {
            var iframe = document.getElementById('ytPlayer');
            if (playing) {
                iframe.src = iframe.src.replace("autoplay=1", "autoplay=0");
                playing = false;
            } else {
                iframe.src = iframe.src.replace("autoplay=0", "autoplay=1");
                playing = true;
            }
        }
    </script>
</body>
</html>
